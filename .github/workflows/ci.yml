name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libcairo2-dev

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Configure (ASAN)
        run: cmake -S . -B build-asan -DBUILD_TESTING=ON -DCMAKE_C_FLAGS="-fsanitize=address,undefined -g" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (ASAN)
        run: cmake --build build-asan

      - name: Test (ASAN)
        run: ctest --test-dir build-asan --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
